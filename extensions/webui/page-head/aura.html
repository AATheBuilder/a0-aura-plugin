<html>
<head>
    <title>Aura: Immersive Backgrounds</title>
    <!-- Import the aura store module following A0 conventions -->
    <script type="module" src="/plugins/aura_plugin/webui/aura-store.js"></script>
</head>
<body>

<div x-data>
    <!-- Store Gating Template: Ensures Alpine.js store is available before rendering -->
    <template x-if="$store.auraStore">
        <div 
            id="aura-background-container" 
            x-init="$store.auraStore.onOpen()" 
            x-destroy="$store.auraStore.cleanup()"
            aria-hidden="true"
            :class="{ 'agent-thinking': $store.auraStore.isThinking }"
        >
            <div class="aura-blob aura-blob-1"></div>
            <div class="aura-blob aura-blob-2"></div>
            <div class="aura-blob aura-blob-3"></div>
        </div>
    </template>
</div>

<style>
  /* Aura Layer - Fixed behind everything */
  #aura-background-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    overflow: hidden;
    background: var(--color-background);
    pointer-events: none;
    transition: background 0.8s ease, opacity 0.5s ease;
  }

  .aura-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    mix-blend-mode: screen;
    pointer-events: none;
    will-change: transform, opacity;
  }

  .aura-blob-1 {
    width: 50vw;
    height: 50vw;
    top: -10%;
    left: -10%;
    background: var(--color-accent);
    animation: aura-drift-1 25s infinite alternate ease-in-out;
  }

  .aura-blob-2 {
    width: 45vw;
    height: 45vw;
    bottom: -15%;
    right: -5%;
    background: var(--color-primary);
    animation: aura-drift-2 35s infinite alternate ease-in-out;
  }

  .aura-blob-3 {
    width: 35vw;
    height: 35vw;
    top: 20%;
    right: 20%;
    background: var(--color-secondary, var(--color-accent));
    opacity: 0.08;
    animation: aura-drift-3 45s infinite alternate ease-in-out;
  }

  /* React to 'agent-thinking' class toggle via Alpine */
  #aura-background-container.agent-thinking .aura-blob {
    opacity: 0.22;
    filter: blur(60px);
    animation-duration: 10s !important;
  }

  @keyframes aura-drift-1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(15%, 20%) scale(1.1); }
  }

  @keyframes aura-drift-2 {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-20%, -15%) rotate(15deg); }
  }

  @keyframes aura-drift-3 {
    0% { transform: translate(0, 0) scale(0.9); }
    100% { transform: translate(-10%, 10%) scale(1.2); }
  }

  /* Subtle glassmorphic panel enhancements */
  .panel, .sidebar-shell, #app-topbar {
    backdrop-filter: blur(16px) !important;
    -webkit-backdrop-filter: blur(16px) !important;
    background: rgba(0, 0, 0, 0.45) !important;
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
</style>

</body>
</html>
