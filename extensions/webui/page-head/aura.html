<style>
  /* Aura Layer - Fixed behind everything */
  #aura-background-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    overflow: hidden;
    background: var(--color-background);
    pointer-events: none;
    transition: background 0.8s ease;
  }

  .aura-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    mix-blend-mode: screen;
    pointer-events: none;
    will-change: transform, opacity;
  }

  /* Specific Blob Positions and Animations */
  .aura-blob-1 {
    width: 50vw;
    height: 50vw;
    top: -10%;
    left: -10%;
    background: var(--color-accent);
    animation: aura-drift-1 25s infinite alternate ease-in-out;
  }

  .aura-blob-2 {
    width: 45vw;
    height: 45vw;
    bottom: -15%;
    right: -5%;
    background: var(--color-primary);
    animation: aura-drift-2 35s infinite alternate ease-in-out;
  }

  .aura-blob-3 {
    width: 35vw;
    height: 35vw;
    top: 20%;
    right: 20%;
    background: var(--color-secondary, var(--color-accent));
    opacity: 0.08;
    animation: aura-drift-3 45s infinite alternate ease-in-out;
  }

  /* Soft pulse for active state */
  body.agent-thinking .aura-blob {
    opacity: 0.22;
    filter: blur(60px);
    animation-duration: 10s !important;
  }

  @keyframes aura-drift-1 {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(15%, 20%) scale(1.1); }
  }

  @keyframes aura-drift-2 {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-20%, -15%) rotate(15deg); }
  }

  @keyframes aura-drift-3 {
    0% { transform: translate(0, 0) scale(0.9); }
    100% { transform: translate(-10%, 10%) scale(1.2); }
  }

  /* Glassmorphic Panel Overrides for enhanced depth */
  .panel, .sidebar-shell, #app-topbar {
    backdrop-filter: blur(16px) !important;
    -webkit-backdrop-filter: blur(16px) !important;
    background: rgba(0, 0, 0, 0.45) !important;
    border-color: rgba(255, 255, 255, 0.08) !important;
  }
</style>

<script type="module">
  const initAura = () => {
    // We can add reactive logic here if Alpine stores are available
    // For now, pure CSS motion provides the bulk of the experience
    console.log("🌌 Aura: Immersive Background active.");
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAura);
  } else {
    initAura();
  }
</script>

<div id="aura-background-container" aria-hidden="true">
  <div class="aura-blob aura-blob-1"></div>
  <div class="aura-blob aura-blob-2"></div>
  <div class="aura-blob aura-blob-3"></div>
</div>
